services:
  - type: web
    name: finpath-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    port: 8000
    envVars:
      - key: GROQ_API_KEY
        sync: false
      # Explicit so the production model choice is flippable without a code
      # deploy. Groq retires the llama-3.x models on 2026-08-16.
      - key: GROQ_PRIMARY_MODEL
        value: "openai/gpt-oss-120b"
      - key: GROQ_FALLBACK_MODEL
        value: "openai/gpt-oss-20b"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: AUTH_MOCK
        value: "false"
      - key: SUPABASE_JWT_AUD
        value: "authenticated"
      - key: SUPABASE_JWT_ALGORITHM
        value: "HS256"
      - key: ALLOWED_ORIGINS
        sync: false
