<style>
@font-face { font-family:'Lufga'; src:url('fonts/Lufga-Regular.ttf'); font-weight:400; }

<script type="text/babel">

  lime:'#b0ff09', limeText:'#598500',

  amber:'#f59e0b', amberText:'#a66a00', amberSubtle:'rgba(245,158,11,0.09)',

/* ── DEMO DATA ────────────────────────────────────────── */

    {name:'Debt Crusher',emoji:'⚡',earned:false,color:'#f59e0b'},

const surplus = DATA.income - DATA.expenses - DATA.debtMonthly; // 34500
const fmt = n => n>=100000?'₹'+(n/100000).toFixed(1)+'L':n>=1000?'₹'+Math.round(n/1000)+'K':'₹'+n.toLocaleString('en-IN');
const fmtFull = n => '₹'+n.toLocaleString('en-IN');

/* ── ICONS ───────────────────────────────────────────── */
const Icon = ({d,size=18,w=1.5})=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={w} strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><path d={d}/></svg>;
const Ico = {
  dash:  <Icon d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h7v7h-7z"/>,
  goals: <Icon d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10zm0-6a4 4 0 100-8 4 4 0 000 8z"/>,
  month: <Icon d="M8 2v3M16 2v3M3 9h18M5 4h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V6a2 2 0 012-2z"/>,
  cash:  <Icon d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3M3 16v3a2 2 0 002 2h3m8 0h3a2 2 0 002-2v-3"/>,
  debt:  <Icon d="M2 7h20M2 17h20M5 3h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z"/>,
  scen:  <Icon d="M22 12h-4l-3 9L9 3l-3 9H2"/>,

  chevL: <Icon d="M15 18l-6-6 6-6" size={14}/>,

  dl:    <Icon d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" size={16}/>,
  sun:   <Icon d="M12 7a5 5 0 100 10A5 5 0 0012 7zM12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" size={16}/>,
  moon:  <Icon d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" size={16}/>,
  x:     <Icon d="M18 6L6 18M6 6l12 12" size={14} w={2}/>,
  info:  <Icon d="M12 8v4m0 4h.01M22 12A10 10 0 1112 2a10 10 0 0110 10z" size={14}/>,
  target:<Icon d="M12 22a10 10 0 100-20 10 10 0 000 20zM12 18a6 6 0 100-12 6 6 0 000 12zM12 14a2 2 0 100-4 2 2 0 000 4z"/>,
};

/* ── LOGO ────────────────────────────────────────────── */
function Logo({size=30,t}){
  const [c1,c2] = t===DARK ? ['#7b8cff','#c77dff'] : ['#495bff','#ac49ff'];
  return (
    <svg width={size} height={size} viewBox="0 0 80 80" fill="none">
      <defs><linearGradient id="lg-m" x1="0" y1="1" x2="1" y2="0">
        <stop offset="0%" stopColor={c1}/><stop offset="100%" stopColor={c2}/>
      </linearGradient></defs>
      <path d="M12 60 L38 30" stroke="url(#lg-m)" strokeWidth="11" strokeLinecap="round"/>
      <path d="M38 30 L64 60" stroke="url(#lg-m)" strokeWidth="11" strokeLinecap="round"/>
      <path d="M51 44 L66 16" stroke="url(#lg-m)" strokeWidth="2.5" strokeLinecap="round" strokeOpacity="0.4" strokeDasharray="2 4"/>
      <circle cx="68" cy="13" r="6" fill={c1}/>
      <circle cx="68" cy="13" r="2.8" fill={t===DARK?'#0f1422':'#ffffff'}/>
    </svg>
  );
}

/* ── CARD ────────────────────────────────────────────── */
function Card({children,style={},hover=false,onClick,className=''}){
  const [ov,setOv]=useState(false);
  const base={
    background:'rgba(var(--card-rgb,17,24,39),0.65)',
    backdropFilter:'blur(28px)', WebkitBackdropFilter:'blur(28px)',
    border:'1px solid var(--border)',
    borderRadius:22, padding:24,
    boxShadow: ov&&hover ? '0 16px 44px -8px var(--accent-glow)' : 'var(--shadow)',
    transform: ov&&hover ? 'translateY(-2px)' : 'translateY(0)',
    transition:'transform 350ms cubic-bezier(0.22,1,0.36,1), box-shadow 350ms cubic-bezier(0.22,1,0.36,1)',
    cursor: onClick ? 'pointer' : 'default',
    position:'relative', overflow:'hidden',
  };
  return (
    <div className={className} style={{...base,...style}}
      onMouseEnter={()=>setOv(true)} onMouseLeave={()=>setOv(false)}
      onClick={onClick}>
      {children}
    </div>
  );
}

/* ── HEALTH RING ─────────────────────────────────────── */
function HealthRing({score,t,size=120}){
  const r=(size/2)-9; const circ=2*Math.PI*r;
  const [anim,setAnim]=useState(0);
  useEffect(()=>{const id=setTimeout(()=>setAnim(score),350);return()=>clearTimeout(id);},[score]);
  const off=circ-(anim/100)*circ;
  const lbl=score>=80?{t:'Excellent',c:t.lime}:score>=60?{t:'Strong',c:t.accent}:score>=40?{t:'Steady',c:t.amber}:{t:'Building',c:t.amber};
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
      <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{transform:'rotate(-90deg)'}}>
          <defs><linearGradient id="hr-g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor={t.accent}/><stop offset="100%" stopColor={t.violet}/>
          </linearGradient></defs>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={t.border} strokeWidth="9" strokeDasharray="4 5"/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="url(#hr-g)" strokeWidth="9"
            strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
            style={{transition:'stroke-dashoffset 1400ms cubic-bezier(0.22,1,0.36,1)',filter:`drop-shadow(0 0 6px ${t.accentGlow})`}}/>
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
          <span style={{fontFamily:'Lufga,system-ui',fontSize:size>100?26:18,fontWeight:700,color:t.fg,letterSpacing:'-0.02em',fontVariantNumeric:'slashed-zero tabular-nums'}}>{anim}</span>
          <span style={{fontSize:9,fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',color:t.tertiary,marginTop:1}}>Score</span>
        </div>
      </div>
      <span style={{fontSize:11,fontWeight:700,color:lbl.c,letterSpacing:'0.02em'}}>{lbl.t}</span>
    </div>
  );
}

/* ── GOAL RING ───────────────────────────────────────── */
function GoalRing({goal,t,size=64}){
  const r=(size/2)-5; const circ=2*Math.PI*r;
  const pct=Math.round(goal.current/goal.target*100);
  const [anim,setAnim]=useState(0);
  useEffect(()=>{const id=setTimeout(()=>setAnim(pct),450);return()=>clearTimeout(id);},[pct]);
  const off=circ-(anim/100)*circ;
  return(
    <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={t.border} strokeWidth="4.5"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={goal.color} strokeWidth="4.5"
          strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
          style={{transition:'stroke-dashoffset 1200ms cubic-bezier(0.22,1,0.36,1)',filter:`drop-shadow(0 0 5px ${goal.color}80)`}}/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <span style={{fontSize:size>80?13:10,fontWeight:700,color:t.fg,fontVariantNumeric:'slashed-zero tabular-nums'}}>{anim}%</span>
      </div>
    </div>
  );
}

/* ── SPARKLINE ───────────────────────────────────────── */
function Sparkline({data,color,height=44}){
  const W=300, H=height;
  const mn=Math.min(...data), mx=Math.max(...data);
  const y=v=>H-((v-mn)/(mx-mn))*(H-10)-5;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*W},${y(v)}`).join(' L ');
  const area=`M 0,${H} L 0,${y(data[0])} L ${pts} L ${W},${H} Z`;
  return(
    <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{overflow:'visible'}}>
      <defs>
        <linearGradient id="sp-fill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.28"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#sp-fill)"/>
      <polyline points={pts.replace(/ L /g,' ')} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

/* ── PILL ────────────────────────────────────────────── */
function Pill({label,active,onClick,t}){
  return(
    <button onClick={onClick} style={{
      padding:'6px 14px',borderRadius:99,fontFamily:'Lufga,system-ui',fontSize:12,fontWeight:active?600:500,
      background:active?t.accentSubtle:'transparent',
      border:`1px solid ${active?t.accentGlow:t.border}`,
      color:active?t.accentText:t.secondary,
      cursor:'pointer',transition:'all 150ms ease',whiteSpace:'nowrap',
    }}>{label}</button>
  );
}

/* ── SIDEBAR ─────────────────────────────────────────── */
function Sidebar({t,collapsed,setCollapsed,path,setPath}){
  const sections=[
    {title:'Overview',items:[
      {ico:Ico.dash,label:'Dashboard',path:'/dashboard'},
      {ico:Ico.goals,label:'Goals',path:'/journey'},
      {ico:Ico.month,label:'Month',path:'/month'},
    ]},
    {title:'Money',items:[
      {ico:Ico.cash,label:'Cashflow',path:'/cashflow'},
      {ico:Ico.debt,label:'Debt',path:'/debt'},
      {ico:Ico.scen,label:'Scenarios',path:'/scenarios'},
    ]},
    {title:'Wins',items:[{ico:Ico.prog,label:'Progress',path:'/progress'}]},
  ];
  const W=collapsed?76:232;
  return(
    <aside style={{
      width:W,flexShrink:0,height:'100vh',
      background:`${t.card}`,backdropFilter:'blur(32px)',WebkitBackdropFilter:'blur(32px)',
      borderRight:`1px solid ${t.border}`,
      display:'flex',flexDirection:'column',position:'relative',zIndex:20,
      transition:'width 420ms cubic-bezier(0.22,1,0.36,1)',overflow:'hidden',
    }}>
      {/* Logo row */}
      <div style={{padding:'18px 14px',display:'flex',alignItems:'center',gap:8,position:'relative',flexShrink:0}}>
        <Logo size={30} t={t}/>
        <span style={{fontFamily:'Lufga,system-ui',fontSize:17,fontWeight:600,letterSpacing:'-0.025em',color:t.fg,
          opacity:collapsed?0:1,maxWidth:collapsed?0:160,overflow:'hidden',whiteSpace:'nowrap',
          transition:'opacity 350ms ease,max-width 350ms ease'}}>
          fin<span style={{color:t.accent}}>path</span>
        </span>
        <button onClick={()=>setCollapsed(!collapsed)} style={{
          position:'absolute',right:-12,top:'50%',transform:'translateY(-50%)',
          width:24,height:24,borderRadius:'50%',
          background:t.card,border:`1px solid ${t.border}`,
          display:'flex',alignItems:'center',justifyContent:'center',
          color:t.tertiary,cursor:'pointer',zIndex:30,
          boxShadow:t.shadow,transition:'all 200ms ease',
        }}>{collapsed?Ico.chevR:Ico.chevL}</button>
      </div>

      {/* Nav */}
      <nav style={{flex:1,padding:'0 8px',display:'flex',flexDirection:'column',overflowY:'auto'}}>
        {sections.map((sec,si)=>(
          <div key={sec.title}>
            {si>0&&<div style={{height:1,background:t.border,margin:'6px 0 3px'}}/>}
            <div style={{overflow:'hidden',opacity:collapsed?0:1,maxHeight:collapsed?0:24,
              transition:'opacity 350ms ease,max-height 350ms ease',
              paddingLeft:8,paddingBottom:1,paddingTop:si>0?4:0}}>
              <span style={{fontSize:10,fontWeight:500,color:t.tertiary,opacity:0.55,letterSpacing:'0.02em'}}>{sec.title}</span>
            </div>
            {sec.items.map(it=>{
              const active=path===it.path;
              return(
                <button key={it.path} onClick={()=>setPath(it.path)} title={collapsed?it.label:undefined} style={{
                  display:'flex',alignItems:'center',gap:collapsed?0:8,
                  padding:collapsed?'8px':'8px 10px',justifyContent:collapsed?'center':'flex-start',
                  borderRadius:11,position:'relative',background:active?t.accentSubtle:'transparent',
                  color:active?t.accentText:t.tertiary,fontWeight:active?600:500,fontSize:13,
                  transition:'all 180ms ease',width:'100%',border:'none',cursor:'pointer',
                  fontFamily:'Lufga,system-ui',marginBottom:1,
                }}>
                  {active&&!collapsed&&<div style={{position:'absolute',left:0,top:'50%',transform:'translateY(-50%)',width:2,height:16,borderRadius:'0 2px 2px 0',background:t.accent,boxShadow:`0 0 8px ${t.accentGlow}`}}/>}
                  <span style={{width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,opacity:active?1:0.65}}>{it.ico}</span>
                  <span style={{overflow:'hidden',whiteSpace:'nowrap',opacity:collapsed?0:1,maxWidth:collapsed?0:140,transition:'opacity 350ms ease,max-width 350ms ease'}}>{it.label}</span>
                </button>
              );
            })}
          </div>
        ))}
      </nav>

      {/* Export */}
      <div style={{padding:'0 8px',flexShrink:0}}>
        <button style={{
          width:'100%',display:'flex',alignItems:'center',justifyContent:'center',
          gap:collapsed?0:6,padding:'8px 10px',borderRadius:11,
          background:`linear-gradient(${t.card},${t.card}) padding-box, linear-gradient(135deg,${t.accent},${t.violet}) border-box`,
          border:'1px solid transparent',color:t.fg,fontFamily:'Lufga,system-ui',
          fontWeight:500,fontSize:12,cursor:'pointer',transition:'opacity 200ms ease',
        }}>
          <span style={{flexShrink:0,display:'flex'}}>{Ico.dl}</span>
          <span style={{overflow:'hidden',whiteSpace:'nowrap',opacity:collapsed?0:1,maxWidth:collapsed?0:110,transition:'opacity 350ms ease,max-width 350ms ease'}}>Export Plan</span>
        </button>
      </div>

      {/* Ask Penny */}
      <div style={{padding:'8px',flexShrink:0}}>
        <button style={{
          width:'100%',display:'flex',alignItems:'center',justifyContent:'center',
          gap:collapsed?0:6,padding:'10px',borderRadius:99,
          background:`linear-gradient(135deg,${t.accent},${t.violet})`,
          color:'#fff',border:'none',fontFamily:'Lufga,system-ui',
          fontWeight:600,fontSize:12,cursor:'pointer',
          boxShadow:`0 4px 14px ${t.accentGlow}`,
          transition:'all 200ms ease',

                </div>
                <div style={{flex:1}}>
                  <p style={{fontSize:14,fontWeight:600,color:t.fg,textDecoration:isDone?'line-through':'none',opacity:isDone?0.55:1}}>{g.emoji} {g.name}</p>
                  <p style={{fontSize:11,color:t.tertiary,marginTop:1}}>{fmt(g.monthly)}/mo</p>
                </div>
                <p style={{fontSize:16,fontWeight:700,color:g.color,fontVariantNumeric:'slashed-zero tabular-nums',flexShrink:0}}>{fmt(g.monthly)}</p>
              </div>
            );
          })}
        </Card>

        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <Card className="fade-up fade-up-6" style={{flex:1,border:`1px solid ${t.accentGlow}`,background:`linear-gradient(135deg,${t.card} 60%,${t.accentSubtle})`}}>
            <div style={{position:'absolute',top:-24,right:-24,width:100,height:100,borderRadius:'50%',background:t.accent,opacity:0.07,filter:'blur(28px)',pointerEvents:'none'}}/>
            <div style={{position:'relative',zIndex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
                <div style={{width:28,height:28,borderRadius:8,background:t.accentSubtle,display:'flex',alignItems:'center',justifyContent:'center',color:t.accent}}>{Ico.spark}</div>
                <p style={{fontSize:14,fontWeight:600,color:t.fg}}>Penny's Insights</p>
              </div>
              {DATA.insights.map((ins,i)=>(
                <div key={i} style={{marginBottom:10,paddingLeft:10,borderLeft:`2px solid ${t.accent}50`}}>
                  <p style={{fontSize:12,color:t.secondary,lineHeight:1.6}}>{ins}</p>
                </div>
              ))}
            </div>
          </Card>

          {/* Achievements mini */}
          <Card className="fade-up fade-up-6">
            <p style={{fontSize:10,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:t.tertiary,marginBottom:12}}>Achievements</p>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
              {DATA.badges.map(b=>(
                <div key={b.name} style={{
                  display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'10px 6px',
                  borderRadius:12,
                  background:b.earned?b.color+'14':t.surface,
                  border:`1px solid ${b.earned?b.color+'44':t.border}`,
                  opacity:b.earned?1:0.4,transition:'all 200ms ease',
                }}>
                  <span style={{fontSize:18}}>{b.emoji}</span>
                  <span style={{fontSize:9,fontWeight:600,color:b.earned?b.color:t.tertiary,textAlign:'center',lineHeight:1.2}}>{b.name}</span>
                </div>
              ))}
            </div>
          </Card>
        </div>
      </div>
    </div>
  );
}

/* ── TWEAKS PANEL ────────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "layout": "focus",
  "theme": "dark",
  "period": "YTD"
}/*EDITMODE-END*/;

function TweaksPanel({tweaks,setTweak,visible,onClose}){
  if(!visible)return null;
  const t=tweaks.theme==='dark'?DARK:LIGHT;
  const Row=({label,opts,key_,mk})=>(
    <div style={{marginBottom:14}}>
      <p style={{fontSize:9,fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',color:t.tertiary,marginBottom:7}}>{label}</p>
      <div style={{display:'flex',flexDirection:'column',gap:4}}>
        {opts.map(([v,l])=>{
          const active=tweaks[key_]===v;
          return(
            <button key={v} onClick={()=>setTweak(key_,v)} style={{
              textAlign:'left',padding:'8px 12px',borderRadius:10,border:`1px solid ${active?t.accentGlow:t.border}`,
              background:active?t.accentSubtle:'transparent',
              color:active?t.accentText:t.secondary,
              fontSize:12,fontWeight:active?600:400,cursor:'pointer',fontFamily:'Lufga,system-ui',
              transition:'all 120ms ease',
            }}>{l}</button>
          );
        })}
      </div>
    </div>
  );
  return(
    <div style={{
      position:'fixed',bottom:24,right:24,zIndex:1000,
      background:t.card,backdropFilter:'blur(32px)',WebkitBackdropFilter:'blur(32px)',
      border:`1px solid ${t.border}`,borderRadius:20,padding:20,width:220,
      boxShadow:t.shadowLg,
    }}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <span style={{fontSize:14,fontWeight:700,color:t.fg}}>Tweaks</span>
        <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:t.tertiary,display:'flex',padding:2}}>{Ico.x}</button>
      </div>
      <Row label="Layout" key_="layout" opts={[['focus','🎯 Focus — Clean'],['command','📊 Command — Data'],['journey','🗺️ Journey — Story']]}/>
      <Row label="Theme" key_="theme" opts={[['dark','🌙 Dark mode'],['light','☀️ Light mode']]}/>
      <div>
        <p style={{fontSize:9,fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',color:t.tertiary,marginBottom:7}}>Period</p>
        <div style={{display:'flex',gap:4}}>
          {['This month','Quarter','YTD'].map(p=>{
            const active=tweaks.period===p;
            return(
              <button key={p} onClick={()=>setTweak('period',p)} style={{
                flex:1,padding:'7px 2px',borderRadius:10,border:`1px solid ${active?t.accentGlow:t.border}`,
                background:active?t.accentSubtle:'transparent',
                color:active?t.accentText:t.secondary,
                fontSize:10,fontWeight:active?600:400,cursor:'pointer',fontFamily:'Lufga,system-ui',
              }}>{p==='This month'?'Month':p}</button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ── APP ─────────────────────────────────────────────── */
function App(){
  const [tweaks,setTweaksState]=useState(TWEAK_DEFAULTS);
  const [collapsed,setCollapsed]=useState(false);
  const [path,setPath]=useState('/dashboard');
  const [tweaksVisible,setTweaksVisible]=useState(false);

  const setTweak=(key,value)=>{
    setTweaksState(prev=>{
      const next={...prev,[key]:value};
      window.parent.postMessage({type:'__edit_mode_set_keys',edits:next},'*');
      return next;
    });
  };

  const t=tweaks.theme==='dark'?DARK:LIGHT;

  useEffect(()=>{
    const handler=e=>{
      if(e.data?.type==='__activate_edit_mode')setTweaksVisible(true);
      if(e.data?.type==='__deactivate_edit_mode')setTweaksVisible(false);
    };
    window.addEventListener('message',handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',handler);
  },[]);

  // Inject CSS vars
  useEffect(()=>{
    const r=document.documentElement;
    r.style.setProperty('--card',t.card);
    r.style.setProperty('--border',t.border);
    r.style.setProperty('--shadow',t.shadow);
    r.style.setProperty('--accent-glow',t.accentGlow);
    r.style.setProperty('--card-rgb',t.card.includes('17,24')?' 17,24,39':'255,255,255');
  },[t]);

  return(
    <div style={{
      display:'flex',width:'100vw',height:'100vh',overflow:'hidden',
      background:t.bg,fontFamily:'Lufga,system-ui,sans-serif',color:t.fg,
    }}>
      {/* Background blobs */}
      <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:0}}>
        <div style={{position:'absolute',top:'20%',left:'25%',width:'55vw',height:'55vh',borderRadius:'50%',background:t.blobA,filter:'blur(100px)',opacity:0.5}}/>
        <div style={{position:'absolute',bottom:'15%',right:'10%',width:'40vw',height:'40vh',borderRadius:'50%',background:t.blobB,filter:'blur(80px)',opacity:0.6}}/>
      </div>

      <Sidebar t={t} collapsed={collapsed} setCollapsed={setCollapsed} path={path} setPath={setPath}/>

      <main style={{flex:1,overflowY:'auto',overflowX:'hidden',position:'relative',zIndex:1}}>
        <div style={{maxWidth:1160,margin:'0 auto',padding:'28px 28px 80px'}}>
          {/* Header */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22}}>
            <div>
              <p style={{fontSize:10,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:t.tertiary,marginBottom:4}}>Financial Overview</p>
              <h1 style={{fontSize:34,fontWeight:700,letterSpacing:'-0.03em',color:t.fg}}>Dashboard</h1>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              {['This month','Quarter','YTD'].map(p=>(
                <Pill key={p} label={p} active={tweaks.period===p} onClick={()=>setTweak('period',p)} t={t}/>
              ))}
              <div style={{width:1,height:24,background:t.border,margin:'0 4px'}}/>
              <button onClick={()=>setTweak('theme',tweaks.theme==='dark'?'light':'dark')} style={{
                width:34,height:34,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',
                background:t.surface,border:`1px solid ${t.border}`,color:t.secondary,cursor:'pointer',
              }}>
                {tweaks.theme==='dark'?Ico.sun:Ico.moon}
              </button>
            </div>
          </div>

          {tweaks.layout==='focus'&&<FocusLayout t={t} period={tweaks.period}/>}
          {tweaks.layout==='command'&&<CommandLayout t={t} period={tweaks.period}/>}
          {tweaks.layout==='journey'&&<JourneyLayout t={t}/>}
        </div>
      </main>

      <TweaksPanel tweaks={tweaks} setTweak={setTweak} visible={tweaksVisible}
        onClose={()=>{setTweaksVisible(false);window.parent.postMessage({type:'__edit_mode_dismissed'},'*');}}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
