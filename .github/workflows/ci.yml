name: CI

on:
  # No branch filter on pull_request so stacked PRs (base != main) get CI too.
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          # Version comes from frontend/package.json "packageManager" (no repo-root package.json).
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check
        continue-on-error: true

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      # Typecheck currently reports 37 pre-existing latent errors
      # (motion variants + onboarding breakdown types). Tracked in
      # plans/onboarding-loading-screen-needs-merry-wozniak.md.
      # Run for visibility; do not block CI until backlog cleared.
      - name: Typecheck (non-blocking)
        run: pnpm typecheck
        continue-on-error: true

  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest
        run: pytest

      # mypy is non-blocking until the codebase is fully annotated.
      - name: Mypy (non-blocking)
        run: mypy app
        continue-on-error: true
